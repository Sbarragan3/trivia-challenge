<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivia Challenge</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/favicon.ico" />
  <meta name="description" content="Test your knowledge in Trivia Challenge!">
  <meta property="og:title" content="Trivia Challenge">
  <meta property="og:description" content="Fun quiz game with categories, sound effects, and scoring.">
  <meta property="og:image" content="assets/preview.png">
</head>
<body>
  <div class="game-container">
    <h1>Trivia Challenge</h1>
    <button id="muteBtn">🔊 Sound On</button>

    <div id="setup">
      <label for="yearSelect">Decade:</label>
      <select id="yearSelect"></select>

      <label for="topicSelect">Topic:</label>
      <select id="topicSelect"></select>

      <button id="startBtn">Start Quiz</button>
    </div>

    <div id="quiz" class="hidden">
      <p id="questionCounter"></p>
      <p id="timer">Time left: <span id="timeLeft">10</span> sec</p>
      <p id="questionText"></p>
      <div id="options"></div>
      <p id="feedback"></p>
    </div>

    <div id="results" class="hidden">
      <h2>Quiz Complete!</h2>
      <p id="scoreText"></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <audio id="tickSound" src="assets/tick.mp3" loop></audio>
  <audio id="correctSound" src="assets/correct.mp3"></audio>
  <audio id="wrongSound" src="assets/wrong.mp3"></audio>
  <audio id="bgMusic" src="assets/bg-music.mp3" loop autoplay></audio>
  <script src="main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</body>
</html>
