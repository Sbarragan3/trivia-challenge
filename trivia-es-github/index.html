
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trivia Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Trivia Challenge</h1>

  <div id="auth-section">
    <button id="googleLoginBtn">Sign in with Google</button>
    <button id="signOutBtn" class="hidden">Sign Out</button>
    <p id="userInfo" class="hidden"></p>
  </div>

  <div id="setup">
    <label for="playerName">Name:</label>
    <input type="text" id="playerName"><br>

    <label for="languageSelect">Language:</label>
    <select id="languageSelect">
      <option value="en" selected>English</option>
      <option value="es">Español (España)</option>
      <option value="es-mx">Español (México)</option>
      <option value="fr">Français</option>
      <option value="zh">中文</option>
    </select><br>

    <label for="yearSelect">Decade:</label>
    <select id="yearSelect"></select><br>

    <label for="questionCount">Questions:</label>
    <select id="questionCount">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="15">15</option>
      <option value="20">20</option>
    </select><br>

    <button id="startBtn">Start</button>
  </div>

  <div id="quiz" class="hidden">
    <p id="questionCounter"></p>
    <p>Time left: <span id="timeLeft">10</span>s</p>
    <p id="questionText"></p>
    <div id="options"></div>
    <p id="feedback"></p>
  </div>

  <div id="results" class="hidden">
    <h2>Results</h2>
    <p id="scoreText"></p>
    <div id="leaderboard" class="hidden">
      <h3>Leaderboard</h3>
      <ul id="leaderboardList"></ul>
    </div>
    <button onclick="location.reload()">Play Again</button>
  </div>

  <audio id="tickSound" src="assets/tick.mp3" loop></audio>
  <audio id="correctSound" src="assets/correct.mp3"></audio>
  <audio id="wrongSound" src="assets/wrong.mp3"></audio>
  <script type="module" src="main.js"></script>
  <script type="module" src="main-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</body>
</html>
